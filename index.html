<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
    <style>
        :root {
            --gradiente-atual: linear-gradient(to bottom, #ff758c, #ff7eb3); /* Padrão inicial */
            --cor-botao: rgba(255, 255, 255, 0.25);
            --borda-botao: #ffffff;
            --cor-texto: #ffffff;
            --cor-sucesso: #4ffb4f;
            --cor-erro: #ff4a4a;
            --sombra: rgba(255, 255, 255, 0.5);
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0; 
            background: var(--gradiente-atual);
            font-family: 'Nunito', sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            transition: background 0.8s ease;
        }
        .tela { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 20px; text-align: center; animation: surgir 0.4s ease-out; }
        .tela.ativa { display: flex; }
        @keyframes surgir { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Estilo da Abertura */
        .bebe-emoji { font-size: 80px; animation: flutuar 2.5s ease-in-out infinite; margin-bottom: 5px; }
        .btn-entrar { padding: 18px 45px; font-size: 24px; background: #ffffff; color: #333333; border: none; border-radius: 30px; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.2); cursor: pointer; animation: pulso 1.8s infinite; margin-top: 15px; -webkit-tap-highlight-color: transparent; }
        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Seleção de Cores Iniciais */
        .seletor-cores { display: flex; gap: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3); }
        .opcao-cor { width: 55px; height: 55px; border-radius: 50%; border: 4px solid white; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; -webkit-tap-highlight-color: transparent; }
        .opcao-cor:active { transform: scale(0.85); }
        .opcao-cor.selecionada { transform: scale(1.15); box-shadow: 0 0 15px #ffffff; }

        h1 { font-size: 34px; margin-bottom: 5px; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); font-weight: 900; }
        p.instrucao { font-size: 18px; margin-bottom: 20px; text-shadow: 1px 2px 5px rgba(0,0,0,0.3); }
        .menu-botoes { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
        .btn-grande { padding: 16px; font-size: 20px; font-family: 'Nunito', sans-serif; font-weight: 900; border-radius: 22px; border: 4px solid white; background: rgba(255, 255, 255, 0.2); color: white; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.15); transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 12px; -webkit-tap-highlight-color: transparent; }
        .btn-grande:active { transform: scale(0.93); }
        
        /* Controles superiores */
        .controles-topo { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; z-index: 5; }
        .btn-navegacao { padding: 8px 14px; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 900; border-radius: 15px; background: rgba(0, 0, 0, 0.3); border: 2px solid white; color: white; cursor: pointer; }
        .btn-inicio { background: rgba(255, 255, 255, 0.25); color: white; }

        /* Grid de Conteúdo */
        .grid-conteudo { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 360px; max-height: 55vh; overflow-y: auto; padding: 10px; margin: 0 auto; }
        .bolha-item { aspect-ratio: 1; border-radius: 50%; background: var(--cor-botao); border: 3px solid var(--borda-botao); box-shadow: 0 0 8px var(--sombra); font-size: 24px; color: white; font-family: 'Nunito', sans-serif; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .bolha-item:active { transform: scale(0.85); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); align-items: center; justify-content: center; z-index: 10; padding: 20px; }
        .modal-conteudo { background: white; color: #333; border-radius: 35px; padding: 30px; width: 100%; max-width: 300px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.4); animation: popModal 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popModal { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-emoji { font-size: 85px; margin: 5px 0; animation: flutuar 3s ease-in-out infinite; }
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .modal-texto { font-size: 24px; font-weight: 900; margin-bottom: 20px; color: #121212; }
        .btn-modal-fechar { width: 100%; padding: 12px; font-size: 18px; font-family: 'Nunito', sans-serif; font-weight: 900; border: none; color: white; border-radius: 20px; cursor: pointer; }
        
        /* Jogo */
        .figura-jogo { font-size: 90px; margin-bottom: 5px; animation: flutuar 3s ease-in-out infinite; }
        .opcoes-jogo { display: flex; gap: 15px; margin-top: 15px; }
        .bolha-opcao { width: 85px; height: 85px; border-radius: 50%; background: var(--cor-botao); border: 4px solid var(--borda-botao); box-shadow: 0 0 12px var(--sombra); font-size: 36px; color: white; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .bolha-opcao:active { transform: scale(0.85); }
        #feedback-jogo { font-size: 26px; margin-top: 15px; height: 35px; font-weight: 900; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

            document.getElementById(`cor-${tipo}`).classList.add('selecionada');
            
            document.documentElement.style.setProperty('--gradiente-atual', stylesIniciais[tipo].gradiente);
            document.getElementById('btn-entrar-acao').style.color = stylesIniciais[tipo].corTextoBotao;
            document.getElementById('btn-modal-ok').style.background = stylesIniciais[tipo].gradiente;
        }

        function falarTextoMaterno(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const pronuncia = new SpeechSynthesisUtterance(texto);
                pronuncia.lang = 'pt-BR';
                
                if (vozEscolhida) {
                    pronuncia.voice = vozEscolhida;
                }
                
                pronuncia.rate = 1.95;  // Fala carinhosa e pausada
                pronuncia.pitch = 0.5;   // Sem distorções metálicas
                window.speechSynthesis.speak(pronuncia);
            }
        }
      
        function tocarRisadaDeBebeReal() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                const ctx = new AudioCtx();
                
                const carregarRisada = (tempo, frequenciaBase, duracao) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(frequenciaBase, tempo);
                    // Efeito de vibração da gargalhada infantil
                    osc.frequency.setValueAtTime(frequenciaBase + 80, tempo + duracao * 0.3);
                    osc.frequency.setValueAtTime(frequenciaBase - 40, tempo + duracao * 0.6);
                    
                    gain.gain.setValueAtTime(0, tempo);
                    gain.gain.linearRampToValueAtTime(0.2, tempo + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, tempo + duracao);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start(tempo);
                    osc.stop(tempo + duracao);
                };

                // Sequência de 4 pequenas risadinhas agudas e seguidas de bebê (gargalhada fofa)
                let tempoInicial = ctx.currentTime;
                carregarRisada(tempoInicial, 650, 0.22);
                carregarRisada(tempoInicial + 0.25, 720, 0.18);
                carregarRisada(tempoInicial + 0.45, 680, 0.20);
                carregarRisada(tempoInicial + 0.65, 800, 0.35);
            } catch(e) {
                console.log("Audio API não suportada");
            }
        }

        function irParaTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
        }

        function tocareBoasVindas() {
            falarTextoMaterno("Olá! Vamos brincar e aprender juntos com a mamãe?");
        }

        function iniciarAplicativo() {
            tocarRisadaDeBebeReal(); // Dispara o som real de risada instantaneamente
            setTimeout(() => { 
                tocareBoasVindas();
                irParaTela('tela-temas'); 
            }, 950);
        }

        function escolherTema(tema) {
            temaSelecionado = theme = tema;
            document.getElementById('titulo-tema').innerText = dadosTemas[tema].nome;
            irParaTela('tela-modos');
            let nomeFalar = tema === 'mar' ? "Fundo do Mar" : (tema === 'safari' ? "Animais do Safari" : "Viagem Espacial");
            let saudacoes = ["Que lindo! Vamos para o mundo ", "uau que legal! Entramos no mundo ", "Oba! Vamos ver o mundo "];
            let fraseAleatoria = saudacoes[Math.floor(Math.random() * saudacoes.length)] + nomeFalar;
            falarTextoMaterno(fraseAleatoria);
        }

        function iniciarModo(modo) {
            modoAtual = modo;
            const container = document.getElementById('container-grid');
            container.innerHTML = '';
            
            document.getElementById('titulo-explorar').innerText = modo === 'letras' ? "Explorar Letrinhas! 🅰️" : "Contar Números! 🔢";

            const bancoDados = dadosTemas[temaSelecionado][modo];
            const chaves = Object.keys(bancoDados);
            
            chaves.forEach(chave => {
                const bolha = document.createElement('button');
                bolha.className = 'bolha-item';
                bolha.innerText = chave;
                bolha.onclick = () => verDetalhe(chave);
                container.appendChild(bolha);
            });
            irParaTela('tela-explorar');
            falarTextoMaterno(modo === 'letras' ? "Toque nas letrinhas para ver o desenho!" : "Toque nos números para contar com a mamãe!");
        }

        function verDetalhe(chave) {
            const item = dadosTemas[temaSelecionado][modoAtual][chave];
            if(!item) return;
            document.getElementById('modal-emoji').innerText = item.emoji;
            
            if (modoAtual === 'letras') {
                document.getElementById('modal-texto').innerText = `${chave} de ${item.palavra.toUpperCase()}`;
                falarTextoMaterno(`Letra ${chave}! ${chave} de ${item.palavra}!`);
            } else {
                document.getElementById('modal-texto').innerText = `${chave} - ${item.palavra.toUpperCase()}`;
                falarTextoMaterno(`Número ${chave}! ${item.palavra}!`);
            }
            document.getElementById('modal-card').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-card').style.display = 'none'; }

        function iniciarJogo() {
            faseJogoAtual = 0;
            carregarFaseJogo();
            irParaTela('tela-jogo');
        }

        function carregarFaseJogo() {
            document.getElementById('feedback-jogo').innerText = '';
            const fasesTema = dadosTemas[temaSelecionado].fases;
            const dadosFase = fasesTema[faseJogoAtual];
            document.getElementById('jogo-desenho').innerText = dadosFase.desenho;
            document.getElementById('jogo-pergunta').innerText = dadosFase.pergunta;
            document.getElementById('jogo-btn0').innerText = dadosFase.opcoes[0];
            document.getElementById('jogo-btn1').innerText = dadosFase.opcoes[1];
            document.getElementById('jogo-btn2').innerText = dadosFase.opcoes[2];
            falarTextoMaterno(dadosFase.pergunta);
        }

        function jogarResposta(indice) {
            const fasesTema = dadosTemas[temaSelecionado].fases;
            const dadosFase = fasesTema[faseJogoAtual];
            const escolha = dadosFase.opcoes[indice];
            const feedback = document.getElementById('feedback-jogo');

            if (escolha === dadosFase.correta) {
                let elogios = ["Isso meu amor! Você acertou!", "Muito bem, que orgulho!", "Parabéns, meu coração, tá certinho!"];
                let elogioAleatorio = elogios[Math.floor(Math.random() * elogios.length)];
                
                feedback.innerText = "Muito bem! 🎉";
                feedback.style.color = "var(--cor-sucesso)";
                falarTextoMaterno(elogioAleatorio);

                setTimeout(() => {
                    faseJogoAtual++;
                    if (faseJogoAtual < fasesTema.length) { carregarFaseJogo(); } 
                    else {
                        feedback.innerText = "Parabéns! Você venceu! 🏆";
                        falarTextoMaterno("Parabéns, meu amor! Você completou o jogo inteiro!");
                        setTimeout(() => irParaTela('tela-modos'), 2500);
                    }
                }, 2000);
            } else {
                let incentivos = ["Tente de novo, meu coração!", "Quase! Vamos tentar mais uma vez?", "Olha direitinho e tenta de novo com a mamãe!"];
                let incentivoAleatorio = incentivos[Math.floor(Math.random() * incentivos.length)];
                
                feedback.innerText = "Tente outra vez! ✨";
                feedback.style.color = "var(--cor-erro)";
                falarTextoMaterno(incentivoAleatorio);
            }
        }
        
        // Inicia com o padrão colorido ativo
        mudarCorInicial('colorido');
</script>
